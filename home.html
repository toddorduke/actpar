<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home - Goal Tracker</title>
    <link rel="stylesheet" href="css/home.css">
</head>
<script src="js/home.js"></script>
<body>
    <!-- Navigation Tabs -->
    <nav class="main-nav">
        <div class="nav-container">
            <div class="logo">GoalTracker</div>
            <div class="nav-tabs">
                <a href="home.html" class="nav-tab active">
                    <svg class="nav-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path>
                    </svg>
                    Home
                </a>
                <a href="connections.html" class="nav-tab">
                    <svg class="nav-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path>
                    </svg>
                    Connections
                </a>
                <a href="tribe-community.html" class="nav-tab">
                    <svg class="nav-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z"></path>
                    </svg>
                    Tribe Community
                </a>
                <a href="pact.html" class="nav-tab">
                    <svg class="nav-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path>
                    </svg>
                    The Pact
                </a>
            </div>
            <a href="profile.html" class="profile-link">
                <div class="profile-avatar"></div>
            </a>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="container">
        <!-- Welcome Section -->
        <section class="welcome-section">
            <h1 class="welcome-title">Welcome back, <span id="user-name">Alex</span>! 👋</h1>
            <p class="welcome-subtitle">Stay motivated and crush your goals today</p>
        </section>

        <!-- Main Feed Grid -->
        <div class="feed-grid">
            <!-- Left Column - Main Feed -->
            <div class="main-feed">
                
                <!-- Daily Questions Section -->
                <div class="feed-card">
                    <div class="card-header">
                        <h2 class="card-title">
                            <svg class="card-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8.228 9c.549-1.165 2.03-2 3.772-2 2.21 0 4 1.343 4 3 0 1.4-1.278 2.575-3.006 2.907-.542.104-.994.54-.994 1.093m0 3h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                            </svg>
                            Daily Reflection
                        </h2>
                    </div>
                    <div class="questions-container" id="questions-container">
                        <!-- Questions will be populated by JavaScript -->
                    </div>
                </div>

                <!-- Your Active Goals Section -->
                <div class="feed-card">
                    <div class="card-header">
                        <h2 class="card-title">
                            <svg class="card-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                            </svg>
                            Your Active Goals
                        </h2>
                        <a href="profile.html" class="view-all">View All →</a>
                    </div>
                    <div class="goals-feed" id="goals-feed">
                        <!-- Goals will be populated by JavaScript -->
                    </div>
                </div>

                <!-- Video Snippets Section -->
                <div class="feed-card">
                    <div class="card-header">
                        <h2 class="card-title">
                            <svg class="card-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132a1 1 0 000-1.664z"></path>
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                            </svg>
                            Trending Videos
                        </h2>
                    </div>
                    <div class="video-snippets" id="video-snippets">
                        <!-- Videos will be populated by JavaScript -->
                    </div>
                </div>

            </div>

            <!-- Right Sidebar - Community Activity -->
            <aside class="sidebar">
                
                <!-- Active Members Section -->
                <div class="sidebar-card">
                    <div class="card-header">
                        <h3 class="sidebar-title">
                            <svg class="sidebar-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z"></path>
                            </svg>
                            Active Now
                        </h3>
                    </div>
                    <div class="active-members" id="active-members">
                        <!-- Active members will be populated by JavaScript -->
                    </div>
                </div>

                <!-- Suggested Connections -->
                <div class="sidebar-card">
                    <div class="card-header">
                        <h3 class="sidebar-title">
                            <svg class="sidebar-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M18 9v3m0 0v3m0-3h3m-3 0h-3m-2-5a4 4 0 11-8 0 4 4 0 018 0zM3 20a6 6 0 0112 0v1H3v-1z"></path>
                            </svg>
                            Suggested Connections
                        </h3>
                    </div>
                    <div class="suggested-people" id="suggested-people">
                        <!-- Suggested connections will be populated by JavaScript -->
                    </div>
                </div>

                <!-- Trending Topics -->
                <div class="sidebar-card">
                    <div class="card-header">
                        <h3 class="sidebar-title">
                            <svg class="sidebar-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 8h10M7 12h4m1 8l-4-4H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-3l-4 4z"></path>
                            </svg>
                            Trending Topics
                        </h3>
                    </div>
                    <div class="trending-topics" id="trending-topics">
                        <!-- Trending topics will be populated by JavaScript -->
                    </div>
                </div>

            </aside>
        </div>
    </div>

    <script src="js/home.js"></script>
</body>
</html>
